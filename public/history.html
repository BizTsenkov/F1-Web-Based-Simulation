<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1 2026 Simulation History</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .history-page-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .sim-card {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }

      details.sim-card summary {
        cursor: pointer;
        list-style: none;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: none;
      }

      details.sim-card summary::-webkit-details-marker {
        display: none;
      }
      details[open].sim-card > summary {
        border-bottom: 1px solid var(--border);
      }
      details.sim-card summary:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      .sim-card-title {
        font-size: 1rem;
        font-weight: 700;
        color: var(--white);
      }

      .sim-card-meta {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 0.8rem;
        color: var(--muted);
      }

      .sim-card-body {
        padding: 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }

      .sim-section-title {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
      }

      .delete-btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--muted);
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 0.75rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        flex-shrink: 0;
      }

      .delete-btn:hover {
        border-color: var(--negative);
        color: var(--negative);
      }

      .champion-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #2a220a;
        border: 1px solid var(--yellow);
        color: var(--yellow);
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 700;
      }

      .back-btn {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 8px 16px;
        font-size: 0.85rem;
        font-weight: 700;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .back-btn:hover {
        color: var(--white);
        border-color: var(--muted);
      }

      @media (max-width: 700px) {
        .sim-card-body {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <div class="header-logo">F1</div>
        <h1 id="pageTitle">Simulation History</h1>
      </div>
      <div class="header-right">
        <div class="lang-toggle">
          <button
            class="lang-btn active"
            id="langEN"
            onclick="setLanguage('en')"
          >
            EN
          </button>
          <button class="lang-btn" id="langBG" onclick="setLanguage('bg')">
            BG
          </button>
        </div>
        <a href="/" class="back-btn" id="backBtn">← Back to Simulator</a>
        <button class="reset-btn" id="clearAllBtn">Clear All</button>
      </div>
    </header>

    <main class="container">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-icon">🗂️</span>
          <h2 id="panelTitle">Saved Simulations</h2>
        </div>
        <div class="panel-body" id="historyList">
          <div class="empty-state">
            <div class="empty-state-icon">📂</div>
            <div class="empty-state-text">
              No saved simulations yet. Export a season from the simulator to
              save it here.
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <span>© 2026 F1 Season Simulator</span>
    </footer>

    <script src="js/history.js"></script>
  </body>
</html>
